name: Build macOS Universal Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    name: Build universal DMG/ZIP
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          install_with_retry() {
            local attempt=1
            local max_attempts=4
            until "$@"; do
              local exit_code=$?
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "::error::Dependency install failed after ${attempt} attempts."
                return "${exit_code}"
              fi
              local delay=$((attempt * 30))
              echo "::warning::Dependency install failed (attempt ${attempt}/${max_attempts}, exit ${exit_code}). Retrying in ${delay}s..."
              sleep "${delay}"
              attempt=$((attempt + 1))
            done
          }

          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            install_with_retry npm ci
          else
            install_with_retry npm install
          fi

      - name: Build and publish macOS universal release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "${CSC_LINK}" ]; then
            echo "::warning::MAC_CSC_LINK is not set. Building unsigned artifacts; Gatekeeper and customer auto-update may not work reliably."
            npm run release:mac:unsigned
          else
            npm run release:mac
          fi

      - name: Upload macOS assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" --title "${TAG}" --notes "macOS release artifacts"
          fi
          shopt -s nullglob
          assets=(release_final/*.dmg release_final/*.zip release_final/*.blockmap release_final/latest-mac.yml)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No macOS assets found"
            exit 1
          fi
          gh release upload "${TAG}" "${assets[@]}" --clobber

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: better-life-naver-mac-universal
          if-no-files-found: error
          path: |
            release_final/*.dmg
            release_final/*.zip
            release_final/*.blockmap
            release_final/latest-mac.yml
