name: Build macOS Universal Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    name: Build universal DMG/ZIP
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish macOS universal release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "${CSC_LINK}" ]; then
            echo "::warning::MAC_CSC_LINK is not set. Building unsigned artifacts; Gatekeeper and customer auto-update may not work reliably."
            npm run release:mac:unsigned
          else
            npm run release:mac
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: better-life-naver-mac-universal
          if-no-files-found: error
          path: |
            release_final/*.dmg
            release_final/*.zip
            release_final/latest-mac.yml
