name: Deploy Website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'payment-page/**'
      - 'admin/**'
      - 'spa/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for SPA build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: spa/package-lock.json

      - name: Install SPA dependencies
        working-directory: spa
        run: npm ci

      - name: Build SPA (Vite + React)
        working-directory: spa
        run: npm run build

      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          # 1) Legacy 정적 페이지 복사 (admin + Toss success/fail + 이미지 자산 등)
          cp -r payment-page/* _site/
          cp -r admin _site/admin
          # 2) SPA dist를 root로 덮어쓰기
          cp -r spa/dist/* _site/
          # 3) GitHub Pages Pretty URL 매칭 차단:
          #    /products → products.html 자동 매칭이 SPA 라우터를 가림.
          #    success.html/fail.html (Toss 콜백) 제외하고 모든 root *.html 을
          #    SPA index 로 교체 → Pretty URL 도 SPA 라우터가 처리.
          find _site -maxdepth 1 -name '*.html' \
            ! -name 'index.html' \
            ! -name '404.html' \
            ! -name 'success.html' \
            ! -name 'fail.html' \
            -exec cp _site/index.html {} \;
          # 4) Deep link fallback — 존재하지 않는 경로(/foo)도 SPA index 로
          cp _site/index.html _site/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
