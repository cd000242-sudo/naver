name: Deploy Website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'payment-page/**'
      - 'admin/**'
      - 'spa/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for SPA build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: spa/package-lock.json

      - name: Install SPA dependencies
        working-directory: spa
        run: npm ci

      - name: Build SPA (Vite + React)
        working-directory: spa
        run: npm run build

      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          # 1) Legacy 정적 *.html (호환성 + Toss 콜백용 success.html/fail.html)
          cp -r payment-page/* _site/
          cp -r admin _site/admin
          # 2) Phase 7: SPA를 root로 배포 — index.html 덮어쓰기
          cp -r spa/dist/* _site/
          # 3) Deep link SPA fallback — /products 등 React Router 라우트
          #    GitHub Pages 가 파일 미존재 시 404.html 반환 → SPA index 로 처리
          cp _site/index.html _site/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
