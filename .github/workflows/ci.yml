# ✅ [v1.4.56] ECC 플러그인 CI 템플릿을 better-life-naver 전용으로 교체
# 이전: node tests/run-all.js, scripts/ci/validate-agents.js 등 존재하지 않는 파일 참조 (phantom CI)
# 지금: TypeScript + Vitest + ESLint 기반 실제 동작하는 CI

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # 네이티브 바이너리 다운로드 스킵 (CI에서는 필요 없음, 속도 + 비용 절감)
      PUPPETEER_SKIP_DOWNLOAD: '1'
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      # Electron 바이너리 skip (tsc/test에는 불필요)
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npm test

      - name: Lint (soft fail — 점진 강화 중)
        run: npm run lint
        continue-on-error: true

  # ━━━ Lint 전용 job (별도로 볼 수 있게) ━━━
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      PUPPETEER_SKIP_DOWNLOAD: '1'
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true # 기존 god-file warning 다수 예상
