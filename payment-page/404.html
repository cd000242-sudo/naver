<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // GitHub Pages SPA redirect — handles trailing slash issues
        const path = window.location.pathname;
        if (path.endsWith('/admin') || path.endsWith('/admin/')) {
            window.location.replace('/admin/');
        } else {
            window.location.replace('/');
        }
    </script>
    <link rel="stylesheet" href="summer-theme.css">
</head>
<body>
    <p>Redirecting...</p>
    <script src="summer-theme.js"></script>
</body>
</html>
