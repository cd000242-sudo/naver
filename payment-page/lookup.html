    <style>
        /* CHERRY BLOSSOM */
        .petal-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; overflow: hidden; }
        .petal { position: absolute; top: -60px; width: 18px; height: 18px; background: radial-gradient(ellipse at 30% 30%, #ffb7c5 0%, #ff8fa3 40%, #ff6b8a 100%); border-radius: 50% 0 50% 50%; opacity: 0; animation: petalFall linear infinite; filter: blur(0.5px); box-shadow: 0 0 6px rgba(255,183,197,0.3); }
        .petal:nth-child(odd) { background: radial-gradient(ellipse at 30% 30%, #ffd4e0 0%, #ffaac4 40%, #ff85a1 100%); border-radius: 0 50% 50% 50%; }
        @keyframes petalFall { 0% { opacity: 0; transform: translateX(0) rotate(0deg) scale(0.8); } 10% { opacity: 0.9; } 90% { opacity: 0.6; } 100% { opacity: 0; transform: translateX(120px) rotate(720deg) scale(0.4) translateY(110vh); } }
        /* MUSIC TOGGLE */
        .music-toggle { position: fixed; bottom: 170px; right: 24px; z-index: 10000; width: 52px; height: 52px; border-radius: 50%; background: rgba(255,183,197,0.25); border: 1px solid rgba(255,183,197,0.5); backdrop-filter: blur(12px); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; transition: all 0.3s; box-shadow: 0 4px 20px rgba(255,107,138,0.2); }
        .music-toggle:hover { transform: scale(1.1); background: rgba(255,183,197,0.4); box-shadow: 0 6px 30px rgba(255,107,138,0.4); }
        .music-toggle.playing { animation: musicPulse 1.5s ease-in-out infinite; }
        @keyframes musicPulse { 0%, 100% { box-shadow: 0 4px 20px rgba(255,107,138,0.2); } 50% { box-shadow: 0 4px 30px rgba(255,107,138,0.6), 0 0 60px rgba(255,183,197,0.3); } }
        .music-hint { position: fixed; bottom: 108px; right: 84px; z-index: 10000; background: rgba(255,183,197,0.92); color: #1a0a10; padding: 10px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; white-space: nowrap; box-shadow: 0 4px 20px rgba(255,107,138,0.3); animation: hintFadeIn 0.5s ease-out both, hintFadeOut 0.5s 6s ease-in both; pointer-events: none; }
        .music-hint::after { content: ''; position: absolute; right: -6px; top: 50%; transform: translateY(-50%); border: 6px solid transparent; border-left-color: rgba(255,183,197,0.92); }
        @keyframes hintFadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes hintFadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }
        .music-toggle.attention { animation: bounceAttention 1s ease-in-out 3; }
        @keyframes bounceAttention { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        @media (max-width: 768px) { .music-toggle { bottom: 90px; } }
    </style>
</head>

<body>

    <div class="lookup-container">
        <div class="lookup-card">
            <div style="text-align: center; margin-bottom: 24px;">
                <div style="font-size: 2.5rem; margin-bottom: 8px;">🔍</div>
                <h2>주문 조회</h2>
                <p>구매 시 입력한 이메일 또는 주문번호로<br>라이선스 코드를 확인하세요.</p>
            </div>

            <!-- Tab Switcher -->
            <div class="lookup-tabs" style="display: flex; gap: 8px; margin-bottom: 20px;">
                <button class="lookup-tab active" id="tab-email" onclick="switchTab('email')"
                    style="flex:1; padding: 10px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); border-radius: var(--radius-sm); color: var(--gold-primary); font-weight: 600; font-size: 0.85rem; cursor: pointer; font-family: var(--font-primary); transition: all 0.2s;">
                    📧 이메일로 조회
                </button>
                <button class="lookup-tab" id="tab-order" onclick="switchTab('order')"
                    style="flex:1; padding: 10px; background: var(--bg-glass); border: 1px solid var(--border-glass); border-radius: var(--radius-sm); color: var(--text-secondary); font-weight: 500; font-size: 0.85rem; cursor: pointer; font-family: var(--font-primary); transition: all 0.2s;">

            <!-- Email Lookup -->
            <div id="email-lookup">
                <input type="email" class="lookup-input" id="lookup-email" placeholder="구매 시 입력한 이메일 주소">
                <button class="btn-lookup" onclick="lookupByEmail()">조회하기</button>
            </div>

            <!-- Order ID Lookup -->
            <div id="order-lookup" class="hidden">
                <input type="text" class="lookup-input" id="lookup-order-id" placeholder="주문번호 (예: LP-1234567890-ABCDEF)">
                <button class="btn-lookup" onclick="lookupByOrderId()">조회하기</button>
            </div>

            <!-- Loading -->
            <div id="lookup-loading" class="hidden" style="text-align: center; padding: 30px 0;">
                <div class="loading-spinner-lg"></div>
                <p style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 12px;">조회 중...</p>
            </div>

            <!-- Results -->
            <div id="lookup-results" class="hidden"></div>

            <!-- Error -->
            <div id="lookup-error" class="hidden"
                style="margin-top: 20px; padding: 16px; background: rgba(255,92,117,0.06); border: 1px solid rgba(255,92,117,0.15); border-radius: var(--radius-sm); text-align: center;">
                <p style="font-size: 0.85rem; color: var(--error); font-weight: 600; margin-bottom: 4px;" id="lookup-error-title">조회 실패</p>

                <span>Leaders Pro</span>

    <script>
        const CONFIG = {
            GAS_URL: 'https://script.google.com/macros/s/AKfycbxBOGkjVj4p-6XZ4SEFYKhW3FBmo5gt7Fv6djWhB1TljnDDmx_qlfZ4YdlJNohzIZ8NJw/exec',
            TIMEOUT_MS: 15000,
        };

        // Tab switching
        function switchTab(tab) {
            const emailTab = document.getElementById('tab-email');
            const orderTab = document.getElementById('tab-order');
            const emailLookup = document.getElementById('email-lookup');
            const orderLookup = document.getElementById('order-lookup');

            // Hide results/errors
            document.getElementById('lookup-results').classList.add('hidden');
            document.getElementById('lookup-error').classList.add('hidden');

            if (tab === 'email') {
                emailTab.style.background = 'rgba(201,168,76,0.1)';
                emailTab.style.borderColor = 'rgba(201,168,76,0.3)';
                emailTab.style.color = 'var(--gold-primary)';
                emailTab.style.fontWeight = '600';
                orderTab.style.background = 'var(--bg-glass)';
                orderTab.style.borderColor = 'var(--border-glass)';
                orderTab.style.color = 'var(--text-secondary)';
                orderTab.style.fontWeight = '500';
                emailLookup.classList.remove('hidden');
                orderLookup.classList.add('hidden');
            } else {
                orderTab.style.background = 'rgba(201,168,76,0.1)';
                orderTab.style.borderColor = 'rgba(201,168,76,0.3)';
                orderTab.style.color = 'var(--gold-primary)';
                orderTab.style.fontWeight = '600';
                emailTab.style.background = 'var(--bg-glass)';
                emailTab.style.borderColor = 'var(--border-glass)';
                emailTab.style.color = 'var(--text-secondary)';
                emailTab.style.fontWeight = '500';
                orderLookup.classList.remove('hidden');
                emailLookup.classList.add('hidden');
            }
        }

        // JSONP helper
        function callGAS(action, params) {
            return new Promise((resolve, reject) => {
                const callbackName = '__lookupCb_' + Date.now();
                const timeoutId = setTimeout(() => { delete window[callbackName]; reject(new Error('TIMEOUT')); }, CONFIG.TIMEOUT_MS);

                window[callbackName] = function (data) { clearTimeout(timeoutId); delete window[callbackName]; resolve(data); };

                const queryParts = Object.entries(params).map(([k, v]) => `${k}=${encodeURIComponent(v)}`).join('&');
                const script = document.createElement('script');
                script.src = `${CONFIG.GAS_URL}?action=${action}&${queryParts}&callback=${callbackName}`;
                script.onerror = () => { clearTimeout(timeoutId); delete window[callbackName]; reject(new Error('NETWORK')); };
                document.head.appendChild(script);
            });
        }

        function showLoading() {
            document.getElementById('lookup-loading').classList.remove('hidden');
            document.getElementById('lookup-results').classList.add('hidden');
            document.getElementById('lookup-error').classList.add('hidden');
        }

        function showError(title, message) {
            document.getElementById('lookup-loading').classList.add('hidden');
            document.getElementById('lookup-results').classList.add('hidden');
            document.getElementById('lookup-error').classList.remove('hidden');
            document.getElementById('lookup-error-title').textContent = title;
            document.getElementById('lookup-error-message').textContent = message;
        }

        function showResults(orders) {
            document.getElementById('lookup-loading').classList.add('hidden');
            document.getElementById('lookup-error').classList.add('hidden');

            const container = document.getElementById('lookup-results');
            container.classList.remove('hidden');

            if (!orders || orders.length === 0) {
                container.innerHTML = `
                    <div style="margin-top: 20px; padding: 20px; background: rgba(255,200,76,0.06); border: 1px solid rgba(255,200,76,0.15); border-radius: var(--radius-sm); text-align: center;">
                        <p style="font-size: 0.9rem; color: var(--text-secondary);">주문 내역이 없습니다.</p>
                    </div>`;
                return;
            }

            let html = '';
            orders.forEach((order, i) => {
                html += `
                <div class="lookup-result" style="margin-top: ${i === 0 ? 20 : 12}px; animation: fadeInUp 0.4s ${i * 0.1}s both;">
                    <div class="lookup-result-item">
                        <span class="label">상품</span>
                        <span class="value" style="color: var(--text-primary);">${order.product || '—'}</span>
                    </div>
                    <div class="lookup-result-item">
                        <span class="label">라이선스 코드</span>
                        <span class="value" style="font-family: monospace; letter-spacing: 1px; cursor: pointer;" onclick="copyText('${order.code}')" title="클릭하여 복사">${order.code || '—'}</span>
                    </div>
                    <div class="lookup-result-item">
                        <span class="label">주문번호</span>
                        <span class="value" style="color: var(--text-secondary); font-size: 0.75rem;">${order.orderId || '—'}</span>
                    </div>
                    <div class="lookup-result-item">
                        <span class="label">결제일</span>
                        <span class="value" style="color: var(--text-secondary);">${order.date || '—'}</span>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
        }

        async function copyText(text) {
            try {
                await navigator.clipboard.writeText(text);
                // Brief visual feedback
                const tooltip = document.createElement('div');
                tooltip.textContent = '✅ 복사됨!';
                tooltip.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--gold-gradient);color:#0a0a0f;padding:8px 20px;border-radius:100px;font-size:0.85rem;font-weight:600;z-index:9999;animation:fadeInUp 0.3s both;';
                document.body.appendChild(tooltip);
                setTimeout(() => tooltip.remove(), 1500);
            } catch (e) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
            }
        }

        // Lookup by email
        async function lookupByEmail() {
            const email = document.getElementById('lookup-email').value.trim();
            if (!email || !email.includes('@')) {
                showError('입력 오류', '올바른 이메일 주소를 입력해주세요.');
                return;
            }
            showLoading();
            try {
                const result = await callGAS('lookup-by-email', { email });
                if (result.ok) {
                    showResults(result.orders || []);
                } else {
                    showError('조회 실패', result.error || '해당 이메일로 등록된 주문이 없습니다.');
                }
            } catch (err) {
                showError('연결 실패', '서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.');
            }
        }

        // Lookup by order ID
        async function lookupByOrderId() {
            const orderId = document.getElementById('lookup-order-id').value.trim();
            if (!orderId) {
                showError('입력 오류', '주문번호를 입력해주세요.');
                return;
            }
            showLoading();
            try {
                const result = await callGAS('check-order', { orderId });
                if (result.ok && result.code) {
                    showResults([{
                        product: result.product,
                        code: result.code,
                        orderId: orderId,
                        date: result.date || '—'
                    }]);
                } else {
                    showError('조회 실패', result.error || '해당 주문번호를 찾을 수 없습니다.');
                }
            } catch (err) {
                showError('연결 실패', '서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.');
            }
        }

        // Particles
        function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let particles = [];
            let w, h;
            function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight * 2; }
            resize(); window.addEventListener('resize', resize);

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * w; this.y = Math.random() * h;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedY = -(Math.random() * 0.3 + 0.1);
                    this.speedX = (Math.random() - 0.5) * 0.2;
                    this.opacity = Math.random() * 0.5 + 0.1;
                    this.gold = Math.random() > 0.3;
                }
                update() {
                    this.y += this.speedY; this.x += this.speedX;
                    this.opacity += (Math.random() - 0.5) * 0.01;
                    this.opacity = Math.max(0.05, Math.min(0.6, this.opacity));
                    if (this.y < -10) { this.y = h + 10; this.x = Math.random() * w; }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.gold
                        ? `rgba(201, 168, 76, ${this.opacity})`
                        : `rgba(255, 255, 255, ${this.opacity * 0.4})`;
                    ctx.fill();
                }
            }
            for (let i = 0; i < 40; i++) particles.push(new Particle());
            function animate() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }

        function toggleMobileMenu() { document.getElementById('nav-hamburger').classList.toggle('active'); document.getElementById('nav-links').classList.toggle('mobile-open'); }
        function closeMobileMenu() { document.getElementById('nav-hamburger').classList.remove('active'); document.getElementById('nav-links').classList.remove('mobile-open'); }

        // Enter key handlers
        document.addEventListener('DOMContentLoaded', () => {
            initParticles();
            document.getElementById('lookup-email').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') lookupByEmail();
            });
            document.getElementById('lookup-order-id').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') lookupByOrderId();
            });
        });
    </script>

<!-- CHERRY BLOSSOM PETALS -->
<div class="petal-container" id="petalContainer"></div>

<!-- MUSIC TOGGLE -->
<button class="music-toggle attention" id="musicToggle" title="🌸 봄 배경음악 켜기/끄기">🔇</button>
<div class="music-hint" id="musicHint">🌸 클릭하면 봄 음악이 흘러요</div>

<script>
// Cherry blossom petals
(function() {
    const container = document.getElementById('petalContainer');
    if (!container) return;
    const PETAL_COUNT = 30;
    function createPetal() {
        const petal = document.createElement('div');
        petal.className = 'petal';
        const size = Math.random() * 14 + 8;
        petal.style.width = size + 'px';
        petal.style.height = size + 'px';
        petal.style.left = Math.random() * 100 + '%';
        petal.style.animationDuration = (Math.random() * 8 + 7) + 's';
        petal.style.animationDelay = (Math.random() * 10) + 's';
        container.appendChild(petal);
    }
    for (let i = 0; i < PETAL_COUNT; i++) createPetal();
})();

// YouTube IFrame API Music
(function() {
    const btn = document.getElementById('musicToggle');
    if (!btn) return;
    let player = null, isPlaying = false, apiReady = false;
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
    const playerDiv = document.createElement('div');
    playerDiv.id = 'yt-music-player';
    playerDiv.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;';
    document.body.appendChild(playerDiv);
    window.onYouTubeIframeAPIReady = function() {
        player = new YT.Player('yt-music-player', {
            videoId: 'r4EHi65fa-0',
            playerVars: { autoplay: 0, loop: 1, playlist: 'r4EHi65fa-0', controls: 0, disablekb: 1, fs: 0, modestbranding: 1, rel: 0 },
            events: {
                onReady: function() { apiReady = true; player.setVolume(40); },
                onStateChange: function(e) { if (e.data === YT.PlayerState.ENDED) { player.seekTo(0); player.playVideo(); } }
            }
        });
    };
    btn.addEventListener('click', function() {
        var hint = document.getElementById('musicHint');
        if (hint) hint.remove();
        btn.classList.remove('attention');
        if (!apiReady) return;
        if (!isPlaying) {
            player.playVideo(); isPlaying = true;
            btn.textContent = '\uD83C\uDFB5'; btn.classList.add('playing');
            btn.title = '\uD83C\uDF38 봄 배경음악 끄기';
        } else {
            player.pauseVideo(); isPlaying = false;
            btn.textContent = '\uD83D\uDD07'; btn.classList.remove('playing');
            btn.title = '\uD83C\uDF38 봄 배경음악 켜기';
        }
    });
})();
</script>
