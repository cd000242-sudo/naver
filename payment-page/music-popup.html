<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Leaders Pro Music</title>
    <link rel="preconnect" href="https://www.youtube.com">
    <link rel="preconnect" href="https://s.ytimg.com">
    <link rel="preconnect" href="https://i.ytimg.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: radial-gradient(ellipse at top left, #2d1b69 0%, #1a0a2e 50%, #0a0a0f 100%);
            color: #fff;
            font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            user-select: none;
        }
        body {
            display: flex; flex-direction: column;
            min-height: 100vh; padding: 24px 20px 20px;
            position: relative;
        }
        body::before {
            content: ''; position: absolute; inset: 0;
            background:
                radial-gradient(circle at 20% 10%, rgba(255,215,0,0.10) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(124,58,237,0.12) 0%, transparent 40%);
            pointer-events: none;
        }
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; position: relative; z-index: 2;
        }
        .brand {
            font-size: 11px; color: rgba(255,215,0,0.85); font-weight: 800;
            letter-spacing: 2px;
        }
        .focus-btn {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.7); font-size: 10px; font-weight: 700;
            padding: 6px 10px; border-radius: 20px; cursor: pointer;
            transition: all .2s;
        }
        .focus-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .album {
            width: 200px; height: 200px; border-radius: 28px;
            background: linear-gradient(135deg, #c9a84c 0%, #d4a012 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 96px; margin: 0 auto 28px;
            box-shadow:
                0 20px 60px rgba(201,168,76,0.45),
                0 0 80px rgba(255,215,0,0.18),
                inset 0 -8px 24px rgba(0,0,0,0.15);
            position: relative; z-index: 2;
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .album.playing { animation: float 4s ease-in-out infinite, glow 2.5s ease-in-out infinite; }
        @keyframes glow {
            0%,100% { box-shadow: 0 20px 60px rgba(201,168,76,0.45), 0 0 80px rgba(255,215,0,0.18); }
            50%     { box-shadow: 0 20px 80px rgba(201,168,76,0.7), 0 0 120px rgba(255,215,0,0.35); }
        }
        .track-info { text-align: center; margin-bottom: 6px; position: relative; z-index: 2; }
        .track-title {
            font-size: 18px; font-weight: 800;
            letter-spacing: -0.3px; margin-bottom: 6px;
            max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .now-playing {
            font-size: 11px; color: rgba(255,215,0,0.7); font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
        }
        .progress-wrap {
            width: 80%; max-width: 240px; margin: 16px auto 24px;
            position: relative; z-index: 2;
        }
        .progress-bar {
            width: 100%; height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 4px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #c9a84c, #ffd700);
            transition: width 0.3s linear;
        }
        .time-row {
            display: flex; justify-content: space-between;
            font-size: 10px; color: rgba(255,255,255,0.5);
            margin-top: 6px; font-variant-numeric: tabular-nums;
        }
        .controls {
            display: flex; gap: 14px; align-items: center;
            justify-content: center; margin-bottom: 22px;
            position: relative; z-index: 2;
        }
        .btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff; cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: all .2s; padding: 0;
        }
        .btn:hover { background: rgba(255,255,255,0.18); transform: scale(1.05); }
        .btn.play {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #c9a84c, #d4a012);
            color: #1a0a2e; font-size: 22px; font-weight: 900;
            box-shadow: 0 8px 24px rgba(201,168,76,0.5);
            border-color: transparent;
        }
        .btn.play:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 32px rgba(201,168,76,0.7);
        }
        .volume-row {
            display: flex; align-items: center; gap: 10px;
            width: 80%; max-width: 220px; margin: 0 auto 16px;
            position: relative; z-index: 2;
            color: rgba(255,255,255,0.55); font-size: 14px;
        }
        .volume-slider {
            flex: 1; height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 4px; appearance: none; -webkit-appearance: none;
            outline: none; cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 14px; height: 14px; border-radius: 50%;
            background: linear-gradient(135deg, #c9a84c, #d4a012);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(201,168,76,0.5);
        }
        .footer-info {
            text-align: center; font-size: 10px;
            color: rgba(255,255,255,0.35);
            margin-top: auto; padding-top: 12px;
            position: relative; z-index: 2;
        }
        .footer-info a { color: rgba(255,215,0,0.7); text-decoration: none; }
        #yt-player { position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="brand">🎵 LEADERS PRO MUSIC</div>
        <button class="focus-btn" onclick="focusMain()" title="메인 사이트 창으로 돌아가기">⬅ 메인</button>
    </div>

    <div class="album" id="album">🌸</div>

    <div class="track-info">
        <div class="track-title" id="trackTitle">Summer Vibes</div>
        <div class="now-playing">🔄 RADIO AUTO-PLAY</div>
    </div>

    <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="time-row">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="prevVideo()" title="이전 곡">⏮</button>
        <button class="btn play" id="playBtn" onclick="togglePlay()" title="재생/일시정지">⏸</button>
        <button class="btn" onclick="nextVideo()" title="다음 곡">⏭</button>
    </div>

    <div class="volume-row">
        <span>🔉</span>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50" oninput="setVolume(this.value)">
        <span id="volumeLabel">50</span>
    </div>

    <div class="footer-info">
        🪟 별도 창 재생 · 메인 사이트 페이지 이동에도 끊김 없음
    </div>

    <div id="yt-player"></div>

    <script>
        // ─────────────────────────────────────────────────
        // 메인 사이트에 "팝업 활성" 플래그 (메인은 자동으로 음악 stop)
        // ─────────────────────────────────────────────────
        try { localStorage.setItem('lp_music_popup_active', String(Date.now())); } catch {}
        window.addEventListener('beforeunload', () => {
            try { localStorage.removeItem('lp_music_popup_active'); } catch {}
        });
        // heartbeat: 1초마다 갱신 → 메인이 팝업 살아있는지 확인 가능
        setInterval(() => {
            try { localStorage.setItem('lp_music_popup_active', String(Date.now())); } catch {}
        }, 1000);

        // ─────────────────────────────────────────────────
        // YouTube IFrame Player
        // ─────────────────────────────────────────────────
        let player = null;
        let isPlaying = false;
        let progressInterval = null;

        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);

        function getResumeTime() {
            try {
                const t = parseFloat(localStorage.getItem('lp_music_time') || '0');
                const ts = parseInt(localStorage.getItem('lp_music_time_ts') || '0');
                if (t > 0 && ts > 0 && Date.now() - ts < 30 * 60 * 1000) return t; // 30분 이내
            } catch {}
            return 16; // 사용자 URL t=16s
        }

        window.onYouTubeIframeAPIReady = function() {
            const resumeTime = getResumeTime();
            player = new YT.Player('yt-player', {
                playerVars: {
                    autoplay: 1,
                    start: Math.floor(resumeTime),
                    listType: 'playlist',
                    list: 'RDf4jS6yW83MU',
                    videoId: 'f4jS6yW83MU',
                    controls: 0, disablekb: 1, fs: 0, modestbranding: 1, rel: 0
                },
                events: {
                    onReady: function() {
                        player.setVolume(50);
                        player.playVideo();
                        startProgressTracking();
                    },
                    onStateChange: function(e) {
                        if (e.data === YT.PlayerState.PLAYING) {
                            isPlaying = true;
                            updatePlayButton();
                            updateTitle();
                            document.getElementById('album').classList.add('playing');
                        } else if (e.data === YT.PlayerState.PAUSED) {
                            isPlaying = false;
                            updatePlayButton();
                            document.getElementById('album').classList.remove('playing');
                        } else if (e.data === YT.PlayerState.BUFFERING || e.data === YT.PlayerState.ENDED) {
                            // Radio mode → YT 자동 다음 곡 진행
                        }
                    },
                    onError: function(e) {
                        console.warn('[POPUP] YT Error:', e.data);
                        try { player.nextVideo(); } catch {}
                    }
                }
            });
        };

        // ─────────────────────────────────────────────────
        // Controls
        // ─────────────────────────────────────────────────
        function togglePlay() {
            if (!player) return;
            if (isPlaying) player.pauseVideo();
            else player.playVideo();
        }
        function nextVideo() { try { player && player.nextVideo(); } catch {} }
        function prevVideo() { try { player && player.previousVideo(); } catch {} }
        function setVolume(v) {
            const n = parseInt(v);
            document.getElementById('volumeLabel').textContent = n;
            try { player && player.setVolume(n); } catch {}
            try { localStorage.setItem('lp_music_volume', String(n)); } catch {}
        }
        function focusMain() {
            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.focus();
                } else {
                    // opener 잃었으면 새 창 열기
                    window.open('/', '_blank');
                }
            } catch {}
        }

        // ─────────────────────────────────────────────────
        // UI Updates
        // ─────────────────────────────────────────────────
        function updatePlayButton() {
            document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
        }
        function updateTitle() {
            try {
                const vd = player.getVideoData();
                if (vd && vd.title) {
                    document.getElementById('trackTitle').textContent = vd.title;
                    document.title = '🎵 ' + vd.title + ' · Leaders Pro';
                }
            } catch {}
        }
        function fmtTime(s) {
            if (!isFinite(s) || s < 0) return '0:00';
            const m = Math.floor(s / 60), sec = Math.floor(s % 60);
            return m + ':' + String(sec).padStart(2, '0');
        }
        function startProgressTracking() {
            if (progressInterval) clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                try {
                    if (!player || typeof player.getCurrentTime !== 'function') return;
                    const cur = player.getCurrentTime() || 0;
                    const dur = player.getDuration() || 0;
                    document.getElementById('currentTime').textContent = fmtTime(cur);
                    document.getElementById('totalTime').textContent = fmtTime(dur);
                    if (dur > 0) document.getElementById('progressFill').style.width = ((cur / dur) * 100) + '%';
                    // 재생 시간 저장 (메인 페이지가 이어재생할 때 사용)
                    if (cur > 0) {
                        localStorage.setItem('lp_music_time', String(cur));
                        localStorage.setItem('lp_music_time_ts', String(Date.now()));
                    }
                } catch {}
            }, 500);
        }

        // 저장된 볼륨 복원
        try {
            const savedVol = parseInt(localStorage.getItem('lp_music_volume') || '50');
            if (!isNaN(savedVol) && savedVol >= 0 && savedVol <= 100) {
                document.getElementById('volumeSlider').value = savedVol;
                document.getElementById('volumeLabel').textContent = savedVol;
            }
        } catch {}
    </script>
</body>
</html>
