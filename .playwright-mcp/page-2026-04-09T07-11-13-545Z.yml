                          - text: 이전 시간 제한을 초과하는 확장된 상호작용을 지원합니다. 슬라이딩 윈도우 메커니즘으로 컨텍스트 윈도우 압축을 구성하여 컨텍스트 길이를 자동으로 관리하고 컨텍스트 제한으로 인한 갑작스러운 종료를 방지합니다.
                        - listitem [ref=e961]:
                          - strong [ref=e962]: "정상적인 연결 해제 알림:"
                          - text: 연결이 종료되기 직전을 나타내는
                          - code [ref=e963]: GoAway
                          - text: 서버 메시지를 수신하여 종료 전에 정상적으로 처리할 수 있습니다.
                    - listitem [ref=e964]:
                      - paragraph [ref=e965]:
                        - strong [ref=e966]: 상호작용 역학에 대한 더 많은 제어
                    - listitem [ref=e967]:
                      - paragraph [ref=e968]:
                        - strong [ref=e969]: "구성 가능한 음성 활동 감지 (VAD):"
                        - text: 감도 수준을 선택하거나 자동 VAD를 완전히 사용 중지하고 수동 턴 제어를 위해 새 클라이언트 이벤트(
                        - code [ref=e970]: activityStart
                        - text: ","
                        - code [ref=e971]: activityEnd
                        - text: )를 사용합니다.
                    - listitem [ref=e972]:
                      - paragraph [ref=e973]:
                        - strong [ref=e974]: "구성 가능한 중단 처리:"
                        - text: 사용자 입력이 모델의 응답을 중단해야 하는지 결정합니다.
                    - listitem [ref=e975]:
                      - paragraph [ref=e976]:
                        - strong [ref=e977]: "구성 가능한 회전 범위:"
                        - text: API가 모든 오디오 및 동영상 입력을 지속적으로 처리하는지 아니면 최종 사용자가 말하는 것으로 감지될 때만 캡처하는지 선택합니다.
                    - listitem [ref=e978]:
                      - paragraph [ref=e979]:
                        - strong [ref=e980]: "구성 가능한 미디어 해상도:"
                        - text: 입력 미디어의 해상도를 선택하여 품질 또는 토큰 사용량을 최적화합니다.
                    - listitem [ref=e981]:
                      - paragraph [ref=e982]:
                        - strong [ref=e983]: 더 풍부한 출력 및 기능
                    - listitem [ref=e984]:
                      - paragraph [ref=e985]:
                        - strong [ref=e986]: "확장된 음성 및 언어 옵션:"
                        - text: 오디오 출력을 위해 2개의 새로운 음성과 30개의 새로운 언어 중에서 선택할 수 있습니다. 이제
                        - code [ref=e987]: speechConfig
                        - text: 내에서 출력 언어를 구성할 수 있습니다.
                    - listitem [ref=e988]:
                      - paragraph [ref=e989]:
                        - strong [ref=e990]: "텍스트 스트리밍:"
                        - text: 텍스트 응답이 생성될 때 점진적으로 수신하여 사용자에게 더 빠르게 표시할 수 있습니다.
                    - listitem [ref=e991]:
                      - paragraph [ref=e992]:
                        - strong [ref=e993]: "토큰 사용량 보고:"
                        - text: 서버 메시지의
                        - code [ref=e994]: usageMetadata
                        - text: 필드에 제공된 자세한 토큰 수를 통해 사용량에 대한 유용한 정보를 얻을 수 있습니다. 토큰 수는 모달리티 및 프롬프트 또는 응답 단계별로 분류됩니다.
