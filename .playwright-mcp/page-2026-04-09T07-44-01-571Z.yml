              - img [ref=e396]
          - paragraph [ref=e398]:
            - text: As we launch safer and more capable models, we regularly retire older models. Software relying on OpenAI models may need occasional updates to keep working. Impacted customers will always be notified by email and in our documentation along with
            - link "blog posts" [ref=e399] [cursor=pointer]:
              - /url: https://openai.com/blog
            - text: for larger changes.
          - paragraph [ref=e400]: This page lists all API deprecations, along with recommended replacements.
          - heading "Deprecation vs. legacy Copy link to deprecation vs legacy" [level=2] [ref=e401]:
            - generic [ref=e402]: Deprecation vs. legacy
            - button "Copy link to deprecation vs legacy" [ref=e403] [cursor=pointer]:
              - img [ref=e404]
          - paragraph [ref=e406]: We use the term “deprecation” to refer to the process of retiring a model or endpoint. When we announce that a model or endpoint is being deprecated, it immediately becomes deprecated. All deprecated models and endpoints will also have a shut down date. At the time of the shut down, the model or endpoint will no longer be accessible.
          - paragraph [ref=e407]: We use the terms “sunset” and “shut down” interchangeably to mean a model or endpoint is no longer accessible.
          - paragraph [ref=e408]: We use the term “legacy” to refer to models and endpoints that no longer receive updates. We tag endpoints and models as legacy to signal to developers where we’re moving as a platform and that they should likely migrate to newer models or endpoints. You can expect that a legacy model or endpoint will be deprecated at some point in the future.
          - heading "Deprecation history Copy link to deprecation history" [level=2] [ref=e409]:
            - generic [ref=e410]: Deprecation history
            - button "Copy link to deprecation history" [ref=e411] [cursor=pointer]:
