              - list [ref=e1362]:
                - listitem [ref=e1363]:
                  - strong [ref=e1364]: "매우 구체적으로 작성:"
                  - text: 세부정보를 많이 제공할수록 더 많은 제어 권한을 갖게 됩니다. '판타지 갑옷' 대신 '은박 무늬가 새겨진 화려한 엘프 판금 갑옷, 높은 칼라와 매 날개 모양의 어깨 보호대를 갖추고 있다'라고 설명합니다.
                - listitem [ref=e1365]:
                  - strong [ref=e1366]: "컨텍스트와 의도 제공:"
                  - text: 이미지의
                  - emphasis [ref=e1367]: 목적
                  - text: 을 설명합니다. 컨텍스트에 대한 모델의 이해가 최종 출력에 영향을 미칩니다. 예를 들어 '고급 미니멀리즘 스킨케어 브랜드를 위한 로고를 만들어 줘'가 '로고를 만들어 줘'보다 더 효과적입니다.
                - listitem [ref=e1368]:
                  - strong [ref=e1369]: "반복 및 미세 조정:"
                  - text: 첫 번째 시도에서 완벽한 이미지를 기대하지 마세요. 모델의 대화형 특성을 사용하여 작은 변경사항을 적용합니다. '좋은데 조명을 좀 더 따뜻하게 해 줘' 또는 '다른 건 그대로 두고 캐릭터의 표정을 더 심각하게 바꿔 줘'와 같은 프롬프트로 후속 조치를 취합니다.
                - listitem [ref=e1370]:
                  - strong [ref=e1371]: "단계별 안내 사용:"
                  - text: 요소가 많은 복잡한 장면의 경우 프롬프트를 단계로 나눕니다. '먼저 새벽의 고요하고 안개 낀 숲의 배경을 만들어 줘. 그런 다음 전경에 이끼로 덮인 고대 돌 제단을 추가하고 마지막으로 제단 위에 빛나는 검 하나를 놓아'
                - listitem [ref=e1372]:
                  - strong [ref=e1373]: "'시맨틱 네거티브 프롬프트' 사용:"
                  - text: "'차가 없다'고 말하는 대신, 원하는 장면을 긍정적으로 묘사하세요.'교통의 흔적조차 없는 텅 빈, 황량한 거리'"
                - listitem [ref=e1374]:
                  - strong [ref=e1375]: "카메라 제어:"
                  - text: 사진 및 영화 촬영 언어를 사용하여 구도를 제어합니다.
                  - code [ref=e1376]: wide-angle shot
                  - text: ","
                  - code [ref=e1377]: macro shot
                  - text: ","
                  - code [ref=e1378]: low-angle perspective
                  - text: 와 같은 용어
