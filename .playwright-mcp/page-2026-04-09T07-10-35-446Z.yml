                    - img [ref=e107]
            - paragraph [ref=e109]: As safer and more capable models launch, Anthropic regularly retires older ones. Applications relying on Anthropic models may need occasional updates to keep working. Impacted customers will always be notified by email and in the documentation.
            - paragraph [ref=e110]: This page lists all API deprecations, along with recommended replacements.
            - heading "Copy link to clipboard Overview" [level=2] [ref=e111]:
              - generic [ref=e112]:
                - button "Copy link to clipboard" [ref=e114] [cursor=pointer]:
                  - img [ref=e116]
                - generic [ref=e118]: Overview
            - paragraph [ref=e119]: "Anthropic uses the following terms to describe the model lifecycle:"
            - list [ref=e120]:
              - listitem [ref=e121]:
                - text: •
                - strong [ref=e122]: Active
                - text: ": The model is fully supported and recommended for use."
              - listitem [ref=e123]:
                - text: •
                - strong [ref=e124]: Legacy
                - text: ": The model will no longer receive updates and may be deprecated in the future."
              - listitem [ref=e125]:
                - text: •
                - strong [ref=e126]: Deprecated
                - text: ": The model is still functional but no longer recommended. Anthropic provides a recommended replacement and assigns a retirement date."
              - listitem [ref=e127]:
                - text: •
                - strong [ref=e128]: Retired
                - text: ": The model is no longer available for use. Requests to retired models will fail."
            - generic [ref=e129]:
              - img [ref=e132]
              - paragraph [ref=e135]: Deprecated models are likely to be less reliable than active models. Move workloads to active models to maintain the highest level of support and reliability.
            - heading "Copy link to clipboard Migrating to replacements" [level=2] [ref=e136]:
              - generic [ref=e137]:
                - button "Copy link to clipboard" [ref=e139] [cursor=pointer]:
                  - img [ref=e141]
                - generic [ref=e143]: Migrating to replacements
            - paragraph [ref=e144]: Once a model is deprecated, migrate all usage to a suitable replacement before the retirement date. Requests to models past the retirement date will fail.
            - paragraph [ref=e145]: To help measure the performance of replacement models on your tasks, consider thorough testing of your applications with the new models well before the retirement date.
            - paragraph [ref=e146]:
              - text: For specific instructions on migrating to the latest Claude models, see the
              - link "Migration guide" [ref=e147] [cursor=pointer]:
                - /url: /docs/en/about-claude/models/migration-guide
              - text: .
            - heading "Copy link to clipboard Notifications" [level=2] [ref=e148]:
              - generic [ref=e149]:
                - button "Copy link to clipboard" [ref=e151] [cursor=pointer]:
                  - img [ref=e153]
                - generic [ref=e155]: Notifications
            - paragraph [ref=e156]: Anthropic notifies customers with active deployments for models with upcoming retirements, providing at least 60 days notice before model retirement for publicly released models.
            - heading "Copy link to clipboard Auditing model usage" [level=2] [ref=e157]:
              - generic [ref=e158]:
                - button "Copy link to clipboard" [ref=e160] [cursor=pointer]:
                  - img [ref=e162]
                - generic [ref=e164]: Auditing model usage
            - paragraph [ref=e165]: "To help identify usage of deprecated models, customers can access an audit of their API usage. Follow these steps:"
            - list [ref=e166]:
              - listitem [ref=e167]:
                - text: Go to the
                - link "Usage" [ref=e168] [cursor=pointer]:
                  - /url: /usage
                - text: page in Console
              - listitem [ref=e169]: Click the "Export" button
              - listitem [ref=e170]: Review the downloaded CSV to see usage broken down by API key and model
            - paragraph [ref=e171]: This audit will help you locate any instances where your application is still using deprecated models, allowing you to prioritize updates to newer models before the retirement date.
            - heading "Copy link to clipboard Best practices" [level=2] [ref=e172]:
              - generic [ref=e173]:
                - button "Copy link to clipboard" [ref=e175] [cursor=pointer]:
                  - img [ref=e177]
                - generic [ref=e179]: Best practices
            - list [ref=e180]:
              - listitem [ref=e181]: Regularly check the documentation for updates on model deprecations.
              - listitem [ref=e182]: Test your applications with newer models well before the retirement date of your current model.
              - listitem [ref=e183]: Update your code to use the recommended replacement model as soon as possible.
              - listitem [ref=e184]: Contact the support team if you need assistance with migration or have any questions.
            - heading "Copy link to clipboard Deprecation downsides and mitigations" [level=2] [ref=e185]:
              - generic [ref=e186]:
                - button "Copy link to clipboard" [ref=e188] [cursor=pointer]:
                  - img [ref=e190]
                - generic [ref=e192]: Deprecation downsides and mitigations
            - paragraph [ref=e193]: "Anthropic currently deprecates and retires models to ensure capacity for new model releases. This comes with downsides:"
            - list [ref=e194]:
              - listitem [ref=e195]: • Users who value specific models must migrate to new versions
              - listitem [ref=e196]: • Researchers lose access to models for ongoing and comparative studies
              - listitem [ref=e197]: • Model retirement introduces safety- and model welfare-related risks
            - paragraph [ref=e198]:
              - text: At some point, Anthropic hopes to make past models publicly available again. In the meantime, Anthropic has committed to long-term preservation of model weights and other measures to help mitigate these impacts. For more details, see
              - link "Commitments on Model Deprecation and Preservation" [ref=e199] [cursor=pointer]:
                - /url: https://www.anthropic.com/research/deprecation-commitments
              - text: .
